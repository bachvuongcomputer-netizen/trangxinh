<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Trang ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff5f9e,#ffb6d9,#ffd6ea);
}

.card{
position:relative;
z-index:100;
background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
padding:45px;
border-radius:25px;
text-align:center;
color:white;
width:90%;
max-width:650px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
}

h1{
font-size:55px;
}

h2{
font-size:70px;
color:#ff004c;
margin:15px 0;
text-shadow:0 0 20px white;
}

p{
font-size:22px;
line-height:1.7;
}

button{
margin:15px;
padding:15px 35px;
border:none;
border-radius:40px;
font-size:22px;
cursor:pointer;
transition:.3s;
}

#yes{
background:#ff0055;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:white;
color:#ff0055;
position:relative;
}

#msg{
display:none;
font-size:30px;
margin-top:20px;
font-weight:bold;
}

.flyText{
position:fixed;
font-weight:bold;
pointer-events:none;
animation:move linear forwards;
white-space:nowrap;
opacity:.9;
}

@keyframes move{
0%{
transform:translateY(110vh) rotate(0deg);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

.heart{
position:fixed;
pointer-events:none;
animation:heart 6s linear forwards;
}

@keyframes heart{
0%{
transform:translateY(100vh) scale(.5);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}
}
</style>

</head>
<body>

<div class="card">

<h1>💖 Gửi đến 💖</h1>

<h2>Trang</h2>

<p>
Có thể anh không phải người hoàn hảo...
</p>

<p>
Nhưng anh sẽ luôn cố gắng yêu thương và trân trọng em.
</p>

<p style="font-size:28px;margin-top:20px;">
❤️ Trang, em làm người yêu anh nhé? ❤️
</p>

<button id="yes" onclick="yesLove()">Đồng ý ❤️</button>
<button id="no" onmouseover="run()">Không 😝</button>

<div id="msg">
🥰 Anh hứa sẽ luôn ở bên em! 🥰
</div>

</div>

<script>

const texts=[
"❤️ Trang ❤️",
"Anh yêu Trang ❤️",
"Làm người yêu anh nhé ❤️",
"Trang là điều tuyệt vời nhất ❤️",
"Anh thích em ❤️",
"I Love You Trang ❤️",
"Mãi bên nhau nhé ❤️"
];

function randomColor(){
const c=[
"#fff",
"#ffe600",
"#ff0055",
"#00ffff",
"#7CFC00",
"#ff69b4"
];
return c[Math.floor(Math.random()*c.length)];
}

function createText(){

const t=document.createElement("div");

t.className="flyText";

t.innerHTML=texts[Math.floor(Math.random()*texts.length)];

t.style.left=Math.random()*100+"vw";

t.style.fontSize=(18+Math.random()*22)+"px";

t.style.color=randomColor();

t.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(t);

setTimeout(()=>t.remove(),10000);

}

setInterval(createText,180);

function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💕","💖","💘","💗"][Math.floor(Math.random()*5)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*35)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(createHeart,250);

function run(){

const b=document.getElementById("no");

b.style.position="fixed";

b.style.left=Math.random()*(window.innerWidth-120)+"px";

b.style.top=Math.random()*(window.innerHeight-70)+"px";

}

function yesLove(){

document.getElementById("msg").style.display="block";

for(let i=0;i<200;i++){

setTimeout(createHeart,i*30);

setTimeout(createText,i*30);

}

}

</script>

</body>
</html>
